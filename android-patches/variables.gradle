// android/variables.gradle
// Based on Capacitor defaults -- adds only what @capacitor-firebase/authentication needs.
ext {
    minSdkVersion = 23
    compileSdkVersion = 35
    targetSdkVersion = 35
    androidxActivityVersion = '1.9.2'
    androidxAppCompatVersion = '1.7.0'
    androidxCoordinatorLayoutVersion = '1.2.0'
    androidxCoreVersion = '1.15.0'
    androidxCoreKTXVersion = '1.15.0'
    androidxFragmentVersion = '1.8.4'
    androidxWebkitVersion = '1.12.1'
    androidxBrowserVersion = '1.8.0'
    coreSplashScreenVersion = '1.0.1'
    junitVersion = '4.13.2'
    androidxJunitVersion = '1.2.1'
    androidxEspressoCoreVersion = '3.6.1'
    cordovaAndroidVersion = '10.1.1'
    kotlin_version = '1.9.25'

    // @capacitor-community/admob
    playServicesAdsVersion = '24.7.+'
    userMessagingPlatformVersion = '3.1.0'

    // @capacitor-firebase/authentication Google Sign-In
    // rgcfaIncludeGoogle=true includes play-services-auth at RUNTIME (not compileOnly)
    // Without this, GoogleAuthProviderHandler is null and sign-in crashes immediately.
    rgcfaIncludeGoogle = true
    firebaseAuthVersion = '23.1.0'
    playServicesAuthVersion = '20.7.0'
    androidxCredentialsVersion = '1.3.0'
    androidxCredentialsPlayServicesAuthVersion = '1.3.0'
    librariesIdentityGoogleidVersion = '1.1.1'
}
